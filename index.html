<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flipkart Clone</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f1f3f6;
    margin: 0;
}

/* Header */
header {
    background: #2874f0;
    color: white;
    padding: 15px;
    text-align: center;
}

/* Layout */
.container {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 250px;
    background: white;
    padding: 15px;
    height: 100vh;
}

.sidebar h3 {
    margin-top: 20px;
}

/* Inputs */
select, input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
}

/* Products Section */
.products {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    padding: 20px;
}

/* Product Card */
.card {
    background: white;
    width: 200px;
    margin: 10px;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 5px;
}

.card h4 {
    margin: 10px 0 5px;
}

.card p {
    margin: 5px 0;
}
</style>
</head>

<body>

<header>
    <h2>Flipkart Clone</h2>
</header>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">

        <h3>Search</h3>
        <input type="text" id="search" placeholder="Search products">

        <h3>Filter by Price</h3>
        <select id="priceFilter">
            <option value="all">All</option>
            <option value="low">Below ₹500</option>
            <option value="mid">₹500 - ₹1000</option>
            <option value="high">Above ₹1000</option>
        </select>

        <h3>Filter by Rating</h3>
        <select id="ratingFilter">
            <option value="all">All</option>
            <option value="4">4★ & above</option>
            <option value="3">3★ & above</option>
        </select>

        <h3>Sort by Price</h3>
        <select id="sort">
            <option value="default">Default</option>
            <option value="lowToHigh">Low to High</option>
            <option value="highToLow">High to Low</option>
        </select>

    </div>

    <!-- Products -->
    <div class="products" id="productContainer"></div>

</div>

<script>

// Product Data (Corrected Images)
const products = [
    {
        name: "Running Shoes",
        price: 400,
        rating: 4,
        img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=500"
    },
    {
        name: "Wrist Watch",
        price: 1200,
        rating: 5,
        img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=500"
    },
    {
        name: "T-Shirt",
        price: 600,
        rating: 3,
        img: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=500"
    },
    {
        name: "Smartphone",
        price: 15000,
        rating: 4,
        img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?q=80&w=500"
    },
];



// Display Products
function displayProducts(data) {
    const container = document.getElementById("productContainer");
    container.innerHTML = "";

    if (data.length === 0) {
        container.innerHTML = "<h3>No products found</h3>";
        return;
    }

    data.forEach(product => {
        container.innerHTML += `
            <div class="card">
                <img src="${product.img}" alt="${product.name}">
                <h4>${product.name}</h4>
                <p><strong>₹${product.price}</strong></p>
                <p>⭐ ${product.rating}</p>
            </div>
        `;
    });
}

// Apply Filters
function applyFilters() {

    let filtered = [...products];

    const search = document.getElementById("search").value.toLowerCase();
    const price = document.getElementById("priceFilter").value;
    const rating = document.getElementById("ratingFilter").value;
    const sort = document.getElementById("sort").value;

    // Search (String Matching)
    if (search) {
        filtered = filtered.filter(p =>
            p.name.toLowerCase().includes(search)
        );
    }

    // Price Filter
    if (price === "low") {
        filtered = filtered.filter(p => p.price < 500);
    } else if (price === "mid") {
        filtered = filtered.filter(p => p.price >= 500 && p.price <= 1000);
    } else if (price === "high") {
        filtered = filtered.filter(p => p.price > 1000);
    }

    // Rating Filter
    if (rating !== "all") {
        filtered = filtered.filter(p => p.rating >= Number(rating));
    }

    // Sorting
    if (sort === "lowToHigh") {
        filtered.sort((a, b) => a.price - b.price);
    } else if (sort === "highToLow") {
        filtered.sort((a, b) => b.price - a.price);
    }

    displayProducts(filtered);
}

// Event Listeners
document.getElementById("search").addEventListener("input", applyFilters);
document.getElementById("priceFilter").addEventListener("change", applyFilters);
document.getElementById("ratingFilter").addEventListener("change", applyFilters);
document.getElementById("sort").addEventListener("change", applyFilters);

// Initial Load
displayProducts(products);

</script>

</body>
</html>
